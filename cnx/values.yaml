replicaCount: 3
namespace: cnx

# 종료 유예 시간 설정 (300초)
terminationGracePeriodSeconds: 300

# 이미지 설정
images:
  ubuntu:
    repository: ubuntu
    tag: "latest"
    pullPolicy: Always
  nginx:
    repository: nginx
    tag: "latest"
    pullPolicy: Always

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

volumes:
  pvc:
    claimName: cte-claim
  configMap:
    name: cte-liveness-config
    defaultMode: 0755